services:
  db:
    container_name: postgres-student-cv
    image: postgres:latest
    environment:
      POSTGRES_USER: admin             # Database Username
      POSTGRES_PASSWORD: password      # Database Password
      POSTGRES_DB: student_cv_db       # Database Name
      PGDATA: /data/postgres
    volumes:
      - db_data:/data/postgres         # Saves data when docker closes
    ports:
      - "5433:5432"                    # Standard port of Postgres (5432)
    networks:
      - backend_network
    restart: unless-stopped

networks:
  backend_network:
    driver: bridge

volumes:
  db_data: